; Raise PHP limits so lesson videos can be uploaded through api/upload.php.
; Hostinger (LiteSpeed) reads .user.ini; changes can take a few minutes to
; take effect (PHP caches it, default 300s). Values are capped by your plan —
; if a large upload still fails, raise "Upload max filesize" in
; hPanel → Advanced → PHP Configuration → PHP Options as well.
upload_max_filesize = 2048M
post_max_size = 2048M
max_execution_time = 600
max_input_time = 600
memory_limit = 256M
